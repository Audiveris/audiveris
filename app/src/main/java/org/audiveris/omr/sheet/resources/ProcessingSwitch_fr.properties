# This file gathers resources to be injected in the ProcessingSwitch class
#
# This is the FR version

# Scaling processing switches

oneLineStaves.text               = Port\u00e9es de percussion \u00e0 1 ligne
oneLineStaves.toolTipText        = <html>Notation de percussion sans hauteur, \
                                          se produisant sur des port\u00e9es d'une seule ligne.</html>

fourStringTablatures.text        = Tablatures de basse \u00e0 4 cordes
fourStringTablatures.toolTipText = <html><b>Note</b>\u00a0: De telles tablatures seront d\u00e9tect\u00e9es \
                                          mais leur contenu <b>ignor\u00e9</b>.</html>

fiveLineStaves.text              = Port\u00e9es standard \u00e0 5 lignes 
fiveLineStaves.toolTipText       = <html>Notation standard, sur port\u00e9es de cinq lignes.</html>

drumNotation.text                = Port\u00e9es de percussions sur 5 lignes
drumNotation.toolTipText         = <html>Notation de percussion sans hauteur, \
                                          se produisant sur des port\u00e9es de cinq lignes.</html>

sixStringTablatures.text         = Tablatures de guitare \u00e0 6 cordes
sixStringTablatures.toolTipText  = <html><b>Note</b>\u00a0: De telles tablatures seront d\u00e9tect\u00e9es \
                                          mais leur contenu <b>ignor\u00e9</b>.</html>

# Other processing switches (in enum order preferably)

articulations.text           = Articulations
articulations.toolTipText    = <html>Accent, tenuto, staccato, staccatissimo, \
                                             fort accent.</html>

bothSharedHeadDots.text      = Lier les augmentations aux 2 t\u00eates en mirroir
bothSharedHeadDots.toolTipText   = <html>Pour les t\u00eates en mirroir, associer l'augmentation aux <b>deux</b> t\u00eates,\
                                             <br>au lieu de juste l'accord de plus longue dur\u00e9e.\
                                             <br>\
                                             <br><b>Note</b>\u00a0: Ceci s'applique uniquement aux t\u00eates situ\u00e9es \
                                             <b>entre</b> les lignes de port\u00e9e ou les lignes suppl\u00e9mentaires.</html>

chordNames.text              = Noms d'accord
chordNames.toolTipText       = <html>par exemple. F&#x266F;m7, Em&#x266D;5, D7&#x266F;5, \
                                       Am7&#x266D;5, A(9), BMaj7/D&#x266F;</html>

crossHeads.text              = Notes en croix
crossHeads.toolTipText       = <html>Notes <b>Ghost</b>, sans hauteur perceptible, \
                                      repr\u00e9sent\u00e9es par un '<b>X</b>'.</html>

fingerings.text              = Doigt\u00e9s chiffr\u00e9s
fingerings.toolTipText       = <html>Indication du doigt\u00a0: 0, 1, 2, 3, 4, 5.</html>

frets.text                   = Frettes en chiffres romains (I, II, IV...)
frets.toolTipText            = <html>Non encore impl\u00e9ment\u00e9</html>

implicitTuplets.text         = Triplets implicites
implicitTuplets.toolTipText  = <html>Si n\u00e9cessaire, le rythme de la mesure peut \u00eatre corrig\u00e9 \
                                      par insertion automatique de n-olets virtuels.</html>

indentations.text            = Utiliser l'indentation des syst\u00e8mes
indentations.toolTipText     = <html>S'appuyer sur l'indentation relative d'un syst\u00e8me pour \
                                      d\u00e9tecter le d\u00e9but d'un nouveau mouvement.</html>

keepGrayImages.text          = Conserver les images en niveaux de gris
keepGrayImages.toolTipText   = <html>Conserver les images en niveaux de gris dans les \
                                      fichiers de projet .omr.<br>\
                                      (Noter que la version <b>binaire</b> de l'image est toujours \
                                      conserv\u00e9e)</html>

lyrics.text                  = Paroles
lyrics.toolTipText           = <html>Les lignes de texte sous la port\u00e9e seront consid\u00e9r\u00e9es \
                                      comme des lignes de paroles.</html>

lyricsAboveStaff.text        = Paroles, m\u00eame au-dessus de la port\u00e9e
lyricsAboveStaff.toolTipText = <html>Les lignes de texte <b>au-dessus</b> de la port\u00e9e, \
                                      ainsi qu'en dessous, seront consid\u00e9r\u00e9es comme des lignes de \
                                      paroles.</html>

multiWholeHeadChords.text    = Accords de rondes
multiWholeHeadChords.toolTipText = <html>Accords contenant plusieurs rondes.</html>

partialWholeRests.text       = Pauses plus courtes que la mesure
partialWholeRests.toolTipText= <html>Les pauses peuvent \u00eatre plus courtes que la mesure.<br> \
                                      (S'applique uniquement \u00e0 la <b>PAUSE</b>, pas aux silences \
                                      plus grands) </html>

pluckings.text               = Doigt\u00e9s (p, i, m, a)
pluckings.toolTipText        = <html>Guitare main droite\u00a0:<br> \
                                      ("p" pour le pouce, "i" pour l'index, "m" pour le majeur, \
                                      'a' pour l'annulaire)</html>

smallHeads.text              = Petites t\u00eates de notes
smallHeads.toolTipText       = T\u00eates de notes de taille r\u00e9duite

smallBeams.text              = Petites ligatures
smallBeams.toolTipText       = Ligatures de taille r\u00e9duite

tremolos.text                = Tr\u00e9molos
tremolos.toolTipText         = <html>Tr\u00e9molos avec 1 \u00e0 3 slashs.</html>


